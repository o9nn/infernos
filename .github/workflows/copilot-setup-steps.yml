name: "Copilot Setup Steps"

# Run automatically when changed, and allow manual testing
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named exactly `copilot-setup-steps` to be picked up by Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ----------------------------------------------------------------
      # System dependencies for building Inferno OS (Linux/i386 target)
      # ----------------------------------------------------------------
      - name: Enable i386 multiarch and install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            gcc-multilib \
            libc6-dev \
            libc6-dev-i386 \
            libx11-dev:i386 \
            libxext-dev:i386 \
            build-essential

      # ----------------------------------------------------------------
      # Configure mkconfig for Linux/386 build
      # ----------------------------------------------------------------
      - name: Configure mkconfig
        run: |
          cat > mkconfig <<'EOF'
          ROOT=${{ github.workspace }}
          TKSTYLE=std
          SYSHOST=Linux
          SYSTARG=Linux
          OBJTYPE=386
          OBJDIR=$SYSTARG/$OBJTYPE
          <$ROOT/mkfiles/mkhost-$SYSHOST
          <$ROOT/mkfiles/mkfile-$SYSTARG-$OBJTYPE
          EOF
          echo "mkconfig written:"
          cat mkconfig

      # ----------------------------------------------------------------
      # Bootstrap the mk build tool
      # ----------------------------------------------------------------
      - name: Bootstrap mk build tool
        run: |
          cd ${{ github.workspace }}
          ./makemk.sh
          echo "${{ github.workspace }}/Linux/386/bin" >> $GITHUB_PATH

      # ----------------------------------------------------------------
      # Build full Inferno OS (libraries, compilers, emu, dis tools)
      # ----------------------------------------------------------------
      - name: Build Inferno OS
        run: |
          cd ${{ github.workspace }}
          export PATH="${{ github.workspace }}/Linux/386/bin:$PATH"
          mk nuke
          mk install

      # ----------------------------------------------------------------
      # Python for cognitive / AGI component development
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install any requirements files found in the repo
          REQ_FILES=$(find ${{ github.workspace }} -maxdepth 3 -name "requirements*.txt")
          if [ -n "$REQ_FILES" ]; then
            echo "Found requirements files: $REQ_FILES"
            for f in $REQ_FILES; do
              echo "Installing from $f"
              pip install -r "$f"
            done
          else
            echo "No requirements*.txt files found – skipping"
          fi

      # ----------------------------------------------------------------
      # Verify the environment is fully functional
      # ----------------------------------------------------------------
      - name: Verify Inferno OS environment
        run: |
          export PATH="${{ github.workspace }}/Linux/386/bin:$PATH"

          echo "=== mk version ==="
          mk --help 2>&1 | head -5 || echo "WARNING: mk --help returned non-zero (may not support --help flag)"

          echo "=== Built binaries ==="
          ls -la ${{ github.workspace }}/Linux/386/bin/

          echo "=== emu binary ==="
          if [ -f "${{ github.workspace }}/Linux/386/bin/emu" ]; then
            echo "emu built successfully"
            file ${{ github.workspace }}/Linux/386/bin/emu
          else
            echo "WARNING: emu binary not found"
          fi

          echo "=== Python environment ==="
          python --version
